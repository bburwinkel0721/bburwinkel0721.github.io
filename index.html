<style>
:root{--wcs-blue:#1a3a6b;--wcs-blue-light:#2a5298;--wcs-blue-pale:#e8eef7;--wcs-blue-hover:#345fb4;--accent-green:#22c55e;--accent-red:#ef4444;--accent-orange:#f59e0b;--bg:#f0f4fa;--card:#fff;--text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);--shadow-lg:0 4px 20px rgba(0,0,0,.1);--r:12px;--rs:8px}

.q-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:28px;margin-bottom:16px}.q-text{font-size:16px;line-height:1.75;color:var(--text)}.q-text .katex{font-size:1.1em}.q-text .katex-display{margin:14px 0}

.option-text{font-size:15px;line-height:1.5;color:var(--text);font-weight:500}.option-text .katex{font-size:1.1em}
.free-response-wrap{margin-bottom:20px}.free-response-input{width:100%;max-width:300px;padding:14px 18px;border:2px solid var(--border);border-radius:var(--rs);font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--text);text-align:center}.free-response-input:focus{outline:none;border-color:var(--wcs-blue)}.free-response-input.correct{border-color:var(--accent-green);background:#f0fdf4}.free-response-input.incorrect{border-color:var(--accent-red);background:#fef2f2}
.explanation-panel{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:var(--r);padding:20px 24px;margin-bottom:20px;display:none;animation:slideDown .3s ease}.explanation-panel.show{display:block}@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}.explanation-panel h4{font-size:14px;font-weight:700;color:#065f46;margin-bottom:8px}.explanation-panel p{font-size:14px;line-height:1.75;color:#064e3b}.explanation-panel .katex{font-size:1.05em}
.action-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}.action-bar-left,.action-bar-center,.action-bar-right{display:flex;align-items:center;gap:8px}
.btn{padding:10px 20px;border-radius:var(--rs);border:2px solid var(--border);background:var(--card);font-family:inherit;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}.btn:hover{border-color:var(--wcs-blue);color:var(--wcs-blue);transform:translateY(-1px)}.btn-primary{background:var(--wcs-blue);border-color:var(--wcs-blue);color:#fff}.btn-primary:hover{background:var(--wcs-blue-hover);border-color:var(--wcs-blue-hover);color:#fff}.btn-reveal{border-color:#d4a843;color:#d4a843}.btn-random{border-color:#8b5cf6;color:#8b5cf6}
.dots-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;flex-wrap:wrap}.dot{width:10px;height:10px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s}.dot.active{background:var(--wcs-blue);transform:scale(1.3)}.dot.answered-correct{background:var(--accent-green)}.dot.answered-incorrect{background:var(--accent-red)}
.info-btn{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}.info-btn:hover{background:rgba(255,255,255,.15)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--wcs-blue);color:#fff;padding:12px 24px;border-radius:var(--r);font-weight:600;font-size:14px;box-shadow:var(--shadow-lg);z-index:200;transition:transform .3s ease;pointer-events:none}.toast.show{transform:translateX(-50%) translateY(0)}.toast.success{background:var(--accent-green)}.toast.error{background:var(--accent-red)}
@media(max-width:700px){.header{padding:10px 16px}.toolbar{padding:10px 16px}.main{padding:16px 16px 100px}.q-card{padding:20px}.timer-display{font-size:28px}.action-bar{flex-direction:column;align-items:stretch}.action-bar-left,.action-bar-center,.action-bar-right{justify-content:center}}

<div class="header"><div class="header-left"><div class="logo-circle">🎓</div><div class="header-title"><small></small><h1>SAT Question of the Day</h1></div></div><div style="display:flex;align-items:center;gap:10px"><div class="score-badge">Score: <span class="correct" id="scoreCorrect">0</span> / <span class="total" id="scoreTotal">0</span></div><button class="info-btn" onclick="resetScore()" title="Reset Score">↺</button></div></div>
<div class="toolbar"><div class="dropdown-wrap"><select id="questionSelect" onchange="goToQuestion(this.value)"></select></div><div class="timer-section"><button class="timer-preset active" data-time="300" onclick="setTimer(300,this)">5:00</button><div class="timer-display" id="timerDisplay">5:00</div><button class="btn-go" id="btnGo" onclick="toggleTimer()">▶ Go</button><button class="btn-reset-timer" onclick="resetTimer()" title="Reset Timer">⟲</button></div></div>
<div class="main">
<div class="q-meta"><div class="q-meta-left"><span class="q-number" id="qNumber"></span><span class="q-tag" id="qTag"></span><span class="q-diff" id="qDiff"></span></div><span class="q-source" id="qSource"></span></div>
<div class="progress-line"><div class="progress-line-fill" id="progressFill"></div></div>

<div class="q-card"><div class="q-text" id="qText"></div></div>
<div id="optionsArea"></div>
<div class="explanation-panel" id="explanationPanel"><h4>✅ Explanation</h4><p id="explanationText"></p></div>
<div class="action-bar"><div class="action-bar-left"><button class="btn" onclick="prevQuestion()">← Prev</button></div><div class="action-bar-center"><button class="btn btn-primary" onclick="checkAnswer()">Check Answer</button><button class="btn btn-reveal" onclick="revealAnswer()">👁 Reveal</button><button class="btn btn-random" onclick="randomQuestion()">🎲 Random</button></div><div class="action-bar-right"><button class="btn" onclick="nextQuestion()">Next →</button></div></div>

<script id="questionData">
// QUESTION BANK - All math uses \(...\) for inline and $$...$$ for display
const Q=[
// T7M1
{id:1,text:"The scatterplot shows the temperature, in degrees Fahrenheit (°F), and the distance above sea level, in feet, measured at 6 locations on Mount Jefferson. A line of best fit is also shown.\n\nAt a distance of \\(4{,}000\\) feet above sea level, what is the temperature, in °F, predicted by the line of best fit?",choices:["\\(47\\)","\\(35\\)","\\(25\\)","\\(0\\)"],answer:"B",category:"data-stats",difficulty:"easy",source:"Test 7 · Mod 1",explanation:"The point on the line of best fit at \\(x = 4{,}000\\) has a \\(y\\)-value of \\(35\\). Therefore the predicted temperature is \\(35\\)°F."},
{id:2,text:"Rectangle \\(P\\) has an area of \\(72\\) square inches. If a rectangle with an area of \\(20\\) square inches is removed from rectangle \\(P\\), what is the area, in square inches, of the resulting figure?",choices:["\\(92\\)","\\(84\\)","\\(80\\)","\\(52\\)"],answer:"D",category:"geometry",difficulty:"easy",source:"Test 7 · Mod 1",explanation:"The remaining area is \\(72 - 20 = 52\\) square inches."},
{id:3,text:"$$|p| + 61 = 65$$Which value is a solution to the given equation?",choices:["\\(\\dfrac{65}{61}\\)","\\(4\\)","\\(126\\)","\\(130\\)"],answer:"B",category:"algebra",difficulty:"easy",source:"Test 7 · Mod 1",explanation:"Subtracting \\(61\\) from each side: \\(|p| = 4\\). So \\(p = 4\\) or \\(p = -4\\)."},
{id:4,text:"Lorenzo paid \\(\\$2\\) for cereal and \\(\\$1.90\\) per pound for strawberries. If he paid a total of \\(\\$9.60\\), which equation finds \\(p\\), the number of pounds of strawberries?",choices:["\\(1.90p + 2 = 9.60\\)","\\(1.90p - 2 = 9.60\\)","\\(1.90 + 2p = 9.60\\)","\\(1.90 - 2p = 9.60\\)"],answer:"A",category:"algebra",difficulty:"easy",source:"Test 7 · Mod 1",explanation:"Total cost: \\(1.90p + 2 = 9.60\\)."},
{id:5,text:"A bar graph summarizes the charge, in kilowatt-hours (kWh), a battery received each day for \\(15\\) days.\n\nFor how many of these \\(15\\) days did the battery receive a charge of \\(0\\) kWh?",choices:["\\(0\\)","\\(1\\)","\\(4\\)","\\(6\\)"],answer:"D",category:"data-stats",difficulty:"easy",source:"Test 7 · Mod 1",explanation:"The bar for \\(0\\) kWh reaches a height of \\(6\\)."},
{id:6,text:"A line in the \\(xy\\)-plane has a slope of \\(9\\) and passes through \\((0, -5)\\). The equation \\(y = px + r\\) defines the line. What is the value of \\(p\\)?",type:"free",answer:"9",category:"linear",difficulty:"easy",source:"Test 7 · Mod 1",explanation:"In \\(y = px + r\\), \\(p\\) is the slope. The slope is \\(9\\), so \\(p = 9\\)."},
{id:7,text:"What is an \\(x\\)-coordinate of an \\(x\\)-intercept of the graph of $$y = 3(x - 14)(x + 5)(x + 4)$$in the \\(xy\\)-plane?",type:"free",answer:"14",acceptAlso:["-5","-4"],category:"polynomials",difficulty:"medium",source:"Test 7 · Mod 1",explanation:"Setting \\(y = 0\\):\n\\(x - 14 = 0 \\Rightarrow x = 14\\)\n\\(x + 5 = 0 \\Rightarrow x = -5\\)\n\\(x + 4 = 0 \\Rightarrow x = -4\\)"},
{id:8,text:"A graph shows the estimated value of a tablet over time. The \\(y\\)-intercept is at \\((0, 225)\\). What is the best interpretation?",choices:["The estimated value was \\(\\$225\\) when purchased.","The estimated value \\(24\\) months after purchase was \\(\\$225\\).","The estimated value decreased by \\(\\$225\\) in \\(24\\) months.","The value decreased by approximately \\(2.25\\%\\) each year."],answer:"A",category:"linear",difficulty:"easy",source:"Test 7 · Mod 1",explanation:"At \\(t = 0\\) (when purchased), the value was \\(\\$225\\)."},
{id:9,text:"Triangles \\(EFG\\) and \\(JKL\\) are congruent, where \\(E \\leftrightarrow J\\), \\(F \\leftrightarrow K\\), \\(G \\leftrightarrow L\\). If \\(\\angle E = 45°\\) and \\(\\angle F = 20°\\), what is \\(\\angle J\\)?",choices:["\\(20°\\)","\\(45°\\)","\\(135°\\)","\\(160°\\)"],answer:"B",category:"geometry",difficulty:"easy",source:"Test 7 · Mod 1",explanation:"Since \\(E \\leftrightarrow J\\), we have \\(\\angle J = \\angle E = 45°\\)."},
{id:10,text:"The function \\(f\\) is defined by $$f(x) = \\frac{1}{2}(x + 6)$$What is the value of \\(f(4)\\)?",choices:["\\(20\\)","\\(12\\)","\\(10\\)","\\(5\\)"],answer:"D",category:"functions",difficulty:"easy",source:"Test 7 · Mod 1",explanation:"\\(f(4) = \\dfrac{1}{2}(4 + 6) = \\dfrac{10}{2} = 5\\)"},
{id:11,text:"The graph of a system of an absolute value function and a linear function is shown. What is the solution \\((x, y)\\)?",choices:["\\((0, 8)\\)","\\(\\left(\\dfrac{7}{2},\\; \\dfrac{9}{2}\\right)\\)","\\(\\left(-\\dfrac{7}{2},\\; \\dfrac{9}{2}\\right)\\)","\\((-3, 4)\\)"],answer:"C",category:"systems",difficulty:"medium",source:"Test 7 · Mod 1",explanation:"The intersection is at \\(\\left(-\\dfrac{7}{2},\\; \\dfrac{9}{2}\\right) = (-3.5,\\; 4.5)\\)."},
{id:12,text:"$$y = 6x + 3$$The system has infinitely many solutions. Which could be the second equation?",choices:["\\(y = 2(6x) + 3\\)","\\(y = 2(6x + 3)\\)","\\(2y = 2(6x) + 3\\)","\\(2y = 2(6x + 3)\\)"],answer:"D",category:"systems",difficulty:"medium",source:"Test 7 · Mod 1",explanation:"Multiplying both sides by \\(2\\): \\(2y = 2(6x + 3)\\) is equivalent to the original."},
{id:13,text:"If \\(\\;\\dfrac{6}{7}\\,p + 18 = 54\\), what is the value of \\(7p\\)?",type:"free",answer:"294",category:"algebra",difficulty:"medium",source:"Test 7 · Mod 1",explanation:"\\(\\dfrac{6}{7}p = 36\\;\\Rightarrow\\; p = 42\\;\\Rightarrow\\; 7p = 294\\)"},
{id:14,text:"$$y = 9x + 12 \\qquad x + 7y = 20$$The solution is \\((x, y)\\). What is the value of \\(y\\)?",type:"free",answer:"3",category:"systems",difficulty:"medium",source:"Test 7 · Mod 1",explanation:"Substituting: \\(x + 7(9x+12)=20 \\Rightarrow 64x = -64 \\Rightarrow x=-1\\). Then \\(y = 9(-1)+12 = 3\\)."},
{id:15,text:"A circle has the equation $$(x - 13)^2 + (y - k)^2 = 64$$Which gives the center and radius?",choices:["Center \\((13, k)\\), radius \\(8\\)","Center \\((k, 13)\\), radius \\(8\\)","Center \\((k, 13)\\), radius \\(64\\)","Center \\((13, k)\\), radius \\(64\\)"],answer:"A",category:"circles",difficulty:"medium",source:"Test 7 · Mod 1",explanation:"Standard form: \\((x-h)^2+(y-k)^2=r^2\\). Here \\(h=13\\), \\(r^2=64\\), so \\(r=8\\)."},
{id:16,text:"The function \\(f\\) is defined by \\(f(x) = |x - 4x|\\). What value of \\(a\\) satisfies $$f(5) - f(a) = -15$$",choices:["\\(-20\\)","\\(5\\)","\\(10\\)","\\(45\\)"],answer:"C",category:"functions",difficulty:"hard",source:"Test 7 · Mod 1",explanation:"\\(f(5) = |5-20| = 15\\). Then \\(15 - f(a) = -15\\), so \\(f(a) = 30\\). Since \\(f(a) = |-3a| = 3|a|\\), we get \\(|a|=10\\)."},
{id:17,text:"For the exponential function \\(f\\), \\(f(0) = c\\). Which equation shows \\(c\\) as the coefficient or base?",choices:["\\(f(x) = 22(1.5)^{x+1}\\)","\\(f(x) = 33(1.5)^{x}\\)","\\(f(x) = 49.5(1.5)^{x-1}\\)","\\(f(x) = 74.25(1.5)^{x-2}\\)"],answer:"B",category:"exponents",difficulty:"medium",source:"Test 7 · Mod 1",explanation:"In \\(f(x)=33(1.5)^x\\), when \\(x=0\\): \\(f(0) = 33(1) = 33 = c\\)."},

{id:82,text:"\\(g(x) = x^2 + 9\\). For which \\(x\\) is \\(g(x) = 25\\)?",choices:["\\(4\\)","\\(5\\)","\\(9\\)","\\(13\\)"],answer:"A",category:"quadratic",difficulty:"easy",source:"Test 9 · Mod 1",explanation:"\\(x^2+9=25 \\Rightarrow x^2=16 \\Rightarrow x=4\\)"},
{id:83,text:"Which is equivalent to \\(9x^2+5x\\)?",choices:["\\(x(9x+5)\\)","\\(5x(9x+1)\\)","\\(9x(x+5)\\)","\\(x^2(9x+5)\\)"],answer:"A",category:"polynomials",difficulty:"easy",source:"Test 9 · Mod 1",explanation:"\\(x(9x+5)\\)"},
{id:84,text:"Data: \\(6, 10, 13, 2, 15, 22, 10, 4, 4, 4\\). What is the mean?",type:"free",answer:"9",category:"data-stats",difficulty:"easy",source:"Test 9 · Mod 1",explanation:"\\(\\dfrac{90}{10} = 9\\)"},
{id:85,text:"$$p(x) = 5x - 220$$How many posters for \\(\\$900\\) profit?",type:"free",answer:"224",category:"algebra",difficulty:"easy",source:"Test 9 · Mod 1",explanation:"\\(900 = 5x-220 \\Rightarrow x = 224\\)"},
{id:86,text:"Jay walks at \\(3\\) mph for \\(w\\) hrs, runs at \\(5\\) mph for \\(r\\) hrs, total \\(14\\) mi. Which equation?",choices:["\\(3w+5r=14\\)","\\(\\tfrac{1}{3}w+\\tfrac{1}{5}r=14\\)","\\(\\tfrac{1}{3}w+\\tfrac{1}{5}r=112\\)","\\(3w+5r=112\\)"],answer:"A",category:"algebra",difficulty:"easy",source:"Test 9 · Mod 1",explanation:"\\(3w + 5r = 14\\)"},
{id:87,text:"John paid \\(\\$165\\): \\(\\$37\\) down + \\(p\\) payments of \\(\\$16\\). Which equation?",choices:["\\(16p-37=165\\)","\\(37p-16=165\\)","\\(16p+37=165\\)","\\(37p+16=165\\)"],answer:"C",category:"algebra",difficulty:"easy",source:"Test 9 · Mod 1",explanation:"\\(16p + 37 = 165\\)"},
{id:88,text:"$$y - 57 = px$$Express \\(y\\) in terms of \\(p\\) and \\(x\\).",choices:["\\(y=57x+p\\)","\\(y=px+57\\)","\\(y=57px\\)","\\(y=\\dfrac{px}{57}\\)"],answer:"B",category:"algebra",difficulty:"easy",source:"Test 9 · Mod 1",explanation:"\\(y = px + 57\\)"},
{id:89,text:"Account starts at \\(\\$36{,}100\\), worth \\(\\$68{,}071.93\\) after \\(13\\) years. Which equation?",choices:["\\(A(t)=36{,}100(1.05)^t\\)","\\(A(t)=31{,}971.93(1.05)^t\\)","\\(A(t)=31{,}971.93(0.05)^t\\)","\\(A(t)=36{,}100(0.05)^t\\)"],answer:"A",category:"exponents",difficulty:"medium",source:"Test 9 · Mod 1",explanation:"\\(36{,}100(1.05)^{13} \\approx 68{,}072\\) ✓"},
{id:90,text:"$$y = -2x \\qquad 3x+y=40$$What is \\(x\\)?",type:"free",answer:"40",category:"systems",difficulty:"easy",source:"Test 9 · Mod 1",explanation:"\\(3x+(-2x) = 40 \\Rightarrow x = 40\\)"},
{id:91,text:"Right triangle: one leg \\(= 43.2\\) mm, hypotenuse \\(= 196.8\\) mm. Other leg?",choices:["\\(43.2\\)","\\(120\\)","\\(192\\)","\\(201.5\\)"],answer:"C",category:"geometry",difficulty:"medium",source:"Test 9 · Mod 1",explanation:"\\(\\sqrt{196.8^2-43.2^2} = \\sqrt{36{,}864} = 192\\)"},
{id:92,text:"\\(13\\) is \\(p\\%\\) of \\(25\\). What is \\(p\\)?",type:"free",answer:"52",category:"percent",difficulty:"easy",source:"Test 9 · Mod 1",explanation:"\\(p = \\dfrac{13}{25} \\times 100 = 52\\)"},
// T9M2
{id:93,text:"$$w + 7 = 357$$What is \\(w\\)?",choices:["\\(51\\)","\\(350\\)","\\(364\\)","\\(3{,}577\\)"],answer:"B",category:"algebra",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"\\(w = 350\\)"},
{id:94,text:"Which is equivalent to \\(16(x+15)\\)?",choices:["\\(16x+31\\)","\\(16x+240\\)","\\(16x+1\\)","\\(16x+15\\)"],answer:"B",category:"algebra",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"\\(16x + 240\\)"},
{id:95,text:"\\(28\\) members \\(<40\\) yrs old, \\(107\\) members \\(\\ge 40\\), total \\(135\\). \\(P(\\text{at least }40)\\)?",choices:["\\(\\dfrac{28}{135}\\)","\\(\\dfrac{35}{135}\\)","\\(\\dfrac{100}{135}\\)","\\(\\dfrac{107}{135}\\)"],answer:"D",category:"probability",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"\\(\\dfrac{107}{135}\\)"},
{id:96,text:"$$3x = 12 \\qquad -3x+y=-6$$What is \\(y\\)?",choices:["\\(-3\\)","\\(6\\)","\\(18\\)","\\(30\\)"],answer:"B",category:"systems",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"\\(x=4\\). Then \\(-12+y=-6 \\Rightarrow y = 6\\)."},
{id:97,text:"Line with slope \\(\\dfrac{1}{9}\\) through \\((0, 14)\\). Which equation?",choices:["\\(y=-\\tfrac{1}{9}x-14\\)","\\(y=-\\tfrac{1}{9}x+14\\)","\\(y=\\tfrac{1}{9}x-14\\)","\\(y=\\tfrac{1}{9}x+14\\)"],answer:"D",category:"linear",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"\\(y = \\tfrac{1}{9}x + 14\\)"},
{id:98,text:"Line \\(c\\) crosses parallel lines \\(s\\) and \\(t\\). Angle at \\(t\\) is \\(110°\\). What is \\(x\\) at \\(s\\)?",type:"free",answer:"110",category:"geometry",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"Corresponding angles: \\(x = 110\\)."},
{id:99,text:"$$f(x) = x + \\frac{8}{11}$$What is \\(f\\!\\left(\\dfrac{3}{11}\\right)\\)?",type:"free",answer:"1",category:"functions",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"\\(\\dfrac{3}{11} + \\dfrac{8}{11} = \\dfrac{11}{11} = 1\\)"},
{id:100,text:"Table: \\((0,18),\\;(1,13),\\;(2,8)\\). Linear. Which equation?",choices:["\\(y=18x+13\\)","\\(y=18x+18\\)","\\(y=-5x+13\\)","\\(y=-5x+18\\)"],answer:"D",category:"linear",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"Slope \\(=-5\\), \\(y\\)-int \\(=18\\): \\(y=-5x+18\\)."},
{id:101,text:"$$x+7=10 \\qquad (x+7)^2 = y$$Which \\((x, y)\\) is a solution?",choices:["\\((3, 100)\\)","\\((3, 3)\\)","\\((3, 10)\\)","\\((3, 70)\\)"],answer:"A",category:"systems",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"\\(x=3\\), \\(y = 10^2 = 100\\)."},
{id:102,text:"\\(f(x) = 7x - 84\\). What is the \\(x\\)-intercept of \\(y = f(x)\\)?",choices:["\\((-12, 0)\\)","\\((-7, 0)\\)","\\((7, 0)\\)","\\((12, 0)\\)"],answer:"D",category:"functions",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"\\(7x-84=0 \\Rightarrow x=12\\)"},
{id:103,text:"$$w(t) = 300 - 4t$$Volume draining from a container. How many mL per second?",choices:["\\(300\\)","\\(296\\)","\\(75\\)","\\(4\\)"],answer:"D",category:"linear",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"Rate \\(= 4\\) mL/sec (coefficient of \\(t\\))."},
{id:104,text:"\\(h(x) = x + b\\), \\(h(0) = 45\\). What is \\(b\\)?",type:"free",answer:"45",category:"functions",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"\\(h(0) = 0+b = 45\\)"},
{id:105,text:"$$z^2 + 10z - 24 = 0$$What is one solution?",type:"free",answer:"2",acceptAlso:["-12"],category:"quadratic",difficulty:"medium",source:"Test 9 · Mod 2",explanation:"\\((z+12)(z-2)=0 \\Rightarrow z = -12\\) or \\(z = 2\\)"},
{id:106,text:"\\(\\triangle FGH \\sim \\triangle JKL\\), \\(F \\leftrightarrow J\\), \\(\\angle G = \\angle K = 90°\\). If \\(\\sin F = \\dfrac{308}{317}\\), what is \\(\\sin J\\)?",choices:["\\(\\dfrac{75}{317}\\)","\\(\\dfrac{308}{317}\\)","\\(\\dfrac{317}{308}\\)","\\(\\dfrac{317}{75}\\)"],answer:"B",category:"trig",difficulty:"medium",source:"Test 9 · Mod 2",explanation:"\\(\\sin J = \\sin F = \\dfrac{308}{317}\\)"},
{id:107,text:"Population increased \\(7\\%\\). If 2016 pop is \\(k\\) times 2015 pop, what is \\(k\\)?",choices:["\\(0.07\\)","\\(0.7\\)","\\(1.07\\)","\\(1.7\\)"],answer:"C",category:"percent",difficulty:"easy",source:"Test 9 · Mod 2",explanation:"\\(k = 1 + 0.07 = 1.07\\)"},
{id:108,text:"$$f(t) = 60{,}000 \\cdot 2^{\\,t/410}$$How many minutes to double?",type:"free",answer:"410",category:"exponents",difficulty:"medium",source:"Test 9 · Mod 2",explanation:"Doubles when exponent increases by \\(1\\), i.e., \\(t\\) increases by \\(410\\)."},
{id:109,text:"\\(\\triangle XYZ \\sim \\triangle RST\\), \\(Z \\leftrightarrow T\\), \\(\\angle Z = 20°\\), \\(2 \\cdot XY = RS\\). What is \\(\\angle T\\)?",choices:["\\(2°\\)","\\(10°\\)","\\(20°\\)","\\(40°\\)"],answer:"C",category:"geometry",difficulty:"medium",source:"Test 9 · Mod 2",explanation:"Corresponding angles: \\(\\angle T = \\angle Z = 20°\\)."},
{id:110,text:"Town area: \\(4.36\\) mi². Convert to square yards. (\\(1\\) mi \\(= 1{,}760\\) yd)",choices:["\\(404\\)","\\(7{,}674\\)","\\(710{,}459\\)","\\(13{,}505{,}536\\)"],answer:"D",category:"ratios",difficulty:"medium",source:"Test 9 · Mod 2",explanation:"\\(4.36 \\times 1{,}760^2 = 13{,}505{,}536\\) yd²"},
];
</script>
<script>
// APP ENGINE
let fQ=[...Q],ci=0,cf='all',so=null,ans=false,ti=null,ts=300,tr=false,sc={c:0,t:0},qs={};
function init(){ld();bd();rq();}
function ld(){try{let s=JSON.parse(localStorage.getItem('sq'));if(s)sc=s;let q=JSON.parse(localStorage.getItem('ss'));if(q)qs=q;}catch(e){}us();}
function sv(){try{localStorage.setItem('sq',JSON.stringify(sc));localStorage.setItem('ss',JSON.stringify(qs));}catch(e){}}
function resetScore(){if(!confirm('Reset score and progress?'))return;sc={c:0,t:0};qs={};sv();us();rq();}
function us(){document.getElementById('scoreCorrect').textContent=sc.c;document.getElementById('scoreTotal').textContent=sc.t;}
function setFilter(f,b){cf=f;document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');fQ=f==='all'?[...Q]:Q.filter(q=>q.category===f);ci=0;so=null;ans=false;bd();rq();}
function bd(){const s=document.getElementById('questionSelect');s.innerHTML='';fQ.forEach((q,i)=>{const o=document.createElement('option');o.value=i;const c=q.category.replace(/-/g,' ').replace(/\b\w/g,x=>x.toUpperCase());const p=q.text.replace(/\\\(|\\\)|\\[a-zA-Z{}]+|\$\$/g,'').substring(0,50).replace(/\n/g,' ');o.textContent=`Q${i+1}: ${c}: ${p}...`;s.appendChild(o);});}
function goToQuestion(i){ci=parseInt(i);so=null;ans=false;rq();}
function rq(){
  const q=fQ[ci];if(!q)return;const st=qs[q.id];
  document.getElementById('qNumber').textContent=`Question ${ci+1} of ${fQ.length}`;
  const tg=document.getElementById('qTag');tg.textContent=q.category.replace(/-/g,' ').toUpperCase();tg.className='q-tag '+q.category;
  const df=document.getElementById('qDiff');df.textContent=(q.difficulty||'medium').toUpperCase();df.className='q-diff '+(q.difficulty||'medium');
  document.getElementById('qSource').textContent=q.source;
  document.getElementById('progressFill').style.width=((ci+1)/fQ.length*100)+'%';
  const qt=document.getElementById('qText');qt.innerHTML=q.text.replace(/\n/g,'<br>');rm(qt);
  const ar=document.getElementById('optionsArea');ar.innerHTML='';
  if(q.type==='free'){
    const w=document.createElement('div');w.className='free-response-wrap';
    const ip=document.createElement('input');ip.type='text';ip.className='free-response-input';ip.id='freeInput';ip.placeholder='Your answer...';ip.autocomplete='off';
    if(st){ip.value=st.g||'';ip.classList.add(st.c?'correct':'incorrect');ip.disabled=true;ans=true;}
    ip.addEventListener('keydown',e=>{if(e.key==='Enter')checkAnswer();});
    w.appendChild(ip);ar.appendChild(w);
  }else{
    const ls=document.createElement('div');ls.className='options-list';const lt=['A','B','C','D'];
    q.choices.forEach((ch,i)=>{
      const b=document.createElement('button');b.className='option-btn';b.dataset.letter=lt[i];
      b.innerHTML=`<span class="option-letter">${lt[i]}</span><span class="option-text">${ch}</span>`;
      if(st){ans=true;if(st.g===lt[i]&&st.c)b.classList.add('correct');else if(st.g===lt[i]&&!st.c)b.classList.add('incorrect');if(lt[i]===q.answer&&!st.c)b.classList.add('correct-reveal');b.classList.add('disabled');}
      else{b.onclick=()=>selectOption(lt[i],b);}
      ls.appendChild(b);
    });
    ar.appendChild(ls);rm(ls);
  }
  const ep=document.getElementById('explanationPanel');ep.classList.remove('show');
  const et=document.getElementById('explanationText');et.innerHTML=q.explanation||'';rm(et);
  if(st&&st.r)ep.classList.add('show');
  document.getElementById('questionSelect').value=ci;rd();
}
function selectOption(l,b){if(ans)return;document.querySelectorAll('.option-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');so=l;}
function checkAnswer(){
  const q=fQ[ci];if(!q||ans)return;
  if(q.type==='free'){
    const ip=document.getElementById('freeInput');const v=ip.value.trim();if(!v){st('Enter your answer first!','error');return;}
    let ok=false;const nv=v.toLowerCase().replace(/\s/g,''),na=q.answer.toLowerCase().replace(/\s/g,'');
    if(nv===na)ok=true;if(q.acceptAlso&&q.acceptAlso.some(a=>nv===a.toLowerCase().replace(/\s/g,'')))ok=true;
    if(!ok&&!isNaN(parseFloat(v))&&!isNaN(parseFloat(q.answer))&&Math.abs(parseFloat(v)-parseFloat(q.answer))<0.01)ok=true;
    ip.classList.add(ok?'correct':'incorrect');ip.disabled=true;ans=true;
    qs[q.id]={g:v,c:ok,r:false};sc.t++;if(ok)sc.c++;sv();us();st(ok?'🎉 Correct!':'❌ Answer: '+q.answer,ok?'success':'error');
  }else{
    if(!so){st('Select an answer first!','error');return;}
    const ok=so===q.answer;ans=true;
    document.querySelectorAll('.option-btn').forEach(b=>{b.classList.add('disabled');b.onclick=null;if(b.dataset.letter===so&&ok)b.classList.add('correct');else if(b.dataset.letter===so&&!ok)b.classList.add('incorrect');if(b.dataset.letter===q.answer&&!ok)b.classList.add('correct-reveal');});
    qs[q.id]={g:so,c:ok,r:false};sc.t++;if(ok)sc.c++;sv();us();st(ok?'🎉 Correct!':'❌ Incorrect!',ok?'success':'error');
  }
  rd();
}
function revealAnswer(){const q=fQ[ci];if(!q)return;document.getElementById('explanationPanel').classList.toggle('show');if(qs[q.id])qs[q.id].r=true;sv();}
function prevQuestion(){if(ci>0){ci--;so=null;ans=false;rq();}}
function nextQuestion(){if(ci<fQ.length-1){ci++;so=null;ans=false;rq();}}
function randomQuestion(){ci=Math.floor(Math.random()*fQ.length);so=null;ans=false;rq();st('🎲 Random question!');}
function rd(){const r=document.getElementById('dotsRow');r.innerHTML='';fQ.forEach((q,i)=>{const d=document.createElement('div');d.className='dot';if(i===ci)d.classList.add('active');const s=qs[q.id];if(s&&s.c)d.classList.add('answered-correct');else if(s&&!s.c)d.classList.add('answered-incorrect');d.onclick=()=>{ci=i;so=null;ans=false;rq();};r.appendChild(d);});}
function setTimer(s,b){document.querySelectorAll('.timer-preset').forEach(x=>x.classList.remove('active'));b.classList.add('active');ts=s;if(tr){clearInterval(ti);tr=false;}ut();document.getElementById('btnGo').classList.remove('running');document.getElementById('btnGo').innerHTML='▶ Go';}
function toggleTimer(){if(tr){clearInterval(ti);tr=false;document.getElementById('btnGo').classList.remove('running');document.getElementById('btnGo').innerHTML='▶ Go';}else{tr=true;document.getElementById('btnGo').classList.add('running');document.getElementById('btnGo').innerHTML='⏸ Pause';ti=setInterval(()=>{ts--;if(ts<=0){ts=0;clearInterval(ti);tr=false;document.getElementById('btnGo').classList.remove('running');document.getElementById('btnGo').innerHTML='▶ Go';st("⏰ Time's up!",'error');}ut();},1000);}}
function resetTimer(){clearInterval(ti);tr=false;const a=document.querySelector('.timer-preset.active');ts=a?parseInt(a.dataset.time):300;ut();document.getElementById('btnGo').classList.remove('running');document.getElementById('btnGo').innerHTML='▶ Go';}
function ut(){const m=Math.floor(ts/60),s=ts%60;const d=document.getElementById('timerDisplay');d.textContent=`${m}:${s.toString().padStart(2,'0')}`;d.className='timer-display';if(ts<=60&&ts>10)d.classList.add('warning');else if(ts<=10)d.classList.add('danger');}
function st(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='toast show'+(t?' '+t:'');setTimeout(()=>e.classList.remove('show'),2500);}
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;if(e.key==='ArrowLeft')prevQuestion();if(e.key==='ArrowRight')nextQuestion();if(e.key==='r'&&!e.ctrlKey)randomQuestion();if(['a','b','c','d'].includes(e.key.toLowerCase())){const q=fQ[ci];if(q&&!q.type&&!ans){const l=e.key.toUpperCase();const b=document.querySelector(`.option-btn[data-letter="${l}"]`);if(b)selectOption(l,b);}}if(e.key==='Enter'&&!ans)checkAnswer();});
init();
</script>
</body>
</html>
